services:
  - type: web
    name: veselyy-rad
    runtime: python
    repo: https://github.com/ТВОЙ_НИК/НАЗВАНИЕ_РЕПО
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./game.db
      - key: SECRET_KEY
        value: super_secret_key_change_this_in_production_12345
