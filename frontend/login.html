<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход | ВесёлыйРяд</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background: rgba(15, 15, 25, 0.95);
            border: 1px solid #ff1493;
            border-radius: 24px;
            padding: 2rem;
            width: 400px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 20, 147, 0.2);
        }
        h2 { color: #ff1493; margin-bottom: 1.5rem; }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: rgba(20, 20, 30, 0.9);
            border: 1px solid #333;
            border-radius: 12px;
            color: #fff;
        }
        button {
            background: linear-gradient(135deg, #ff1493, #ff6b9d);
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 1rem;
        }
        .success { color: #0f0; }
        .error { color: #f55; }
        a { color: #ff1493; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🔐 Вход в игру</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Пароль">
        <button onclick="login()">Войти</button>
        <div id="message" style="margin-top: 1rem;"></div>
        <p style="margin-top: 1rem;">Нет аккаунта? <a href="register.html">Регистрация</a></p>
    </div>

    <script>
        const API = window.location.origin;

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');

            try {
                const res = await fetch(`${API}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('access_token', data.access_token);
                    messageDiv.innerHTML = '<div class="success">✅ Вход выполнен! Перенаправление...</div>';
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    messageDiv.innerHTML = `<div class="error">❌ ${data.detail || 'Неверный email или пароль'}</div>`;
                }
            } catch(e) {
                messageDiv.innerHTML = '<div class="error">❌ Ошибка соединения с сервером</div>';
            }
        }
    </script>
</body>
</html>
